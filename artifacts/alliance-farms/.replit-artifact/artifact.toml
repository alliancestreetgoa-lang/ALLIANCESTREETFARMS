kind = "web"
previewPath = "/"
title = "Alliance Street Organic Farms"
version = "1.0.0"
id = "artifacts/alliance-farms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21524
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/alliance-farms run dev"

[services.env]
PORT = "21524"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/alliance-farms", "run", "build"]
publicDir = "artifacts/alliance-farms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
